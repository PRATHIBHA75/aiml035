<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <link href="register.css" rel="stylesheet" />
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>
        <table align="center">
            <tr>
                <td>Enter Student Name</td>
                <td><input type="text" placeholder="John Doe" required></td>
            </tr>

            <tr>
                <td>Enter Password</td>
                <td><input type="password" placeholder="Min. 8 characters" required></td>
            </tr>

            <tr>
                <td>Mobile Number</td>
                <td><input type="tel" placeholder="123-456-7890"></td>
            </tr>

            <tr>
                <td>Enter Date of Birth</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Enter Email ID</td>
                <td><input type="email" placeholder="example@mail.com"></td>
            </tr>

            <tr>
                <td>Select Gender</td>
                <td>
                    <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                </td>
            </tr>

            <tr>
                <td>Select Branch</td>
                <td>
                    <select>
                        <option disabled selected>--SELECT--</option>
                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>MECH</option>
                        <option>CIVIL</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Select Course</td>
                <td>
                    <select>
                        <option disabled selected>--SELECT--</option>
                        <option>Python</option>
                        <option>Java</option>
                        <option>Web Development</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Upload Photo</td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td>Enter Address</td>
                <td><textarea rows="4" cols="25" placeholder="Current Address..."></textarea></td>
            </tr>

            <tr>
                <td colspan="2" align="center" style="padding-top: 20px;">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
